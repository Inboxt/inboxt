services:
  database:
    container_name: "database"
    image: postgres
    ports:
      - ${DATABASE_PORT}:${DATABASE_PORT}
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_USER}
      POSTGRES_DB: ${DATABASE_NAME}
      
      PGUSER: "postgres"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: "api"
    restart: always
    dns: 
      - 8.8.8.8
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    ports:
      - ${API_PORT}:${API_PORT}
    volumes:
      - ./apps/api/src:/usr/src/app/apps/api/src:cached
      - ./apps/api/prisma:/usr/src/app/apps/api/prisma:cached
      - ./.env:/usr/src/app/.env:cached
      - ./apps/api/migrations:/usr/src/app/apps/api/migrations:cached
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      database:
        condition: service_healthy

  web:
    container_name: "web"
    restart: always
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - ${WEB_PORT}:${WEB_PORT}
    volumes:
      - ./apps/web/src:/usr/src/app/apps/web/src:cached
      - ./apps/web/vite.config.mts:/usr/src/app/apps/web/vite.config.mts:cached
      - ./apps/web/index.html:/usr/src/app/apps/web/i ndex.html:cached
      - ./apps/web/public:/usr/src/app/apps/web/public:cached
      - ./.env:/usr/src/app/.env:cached
    depends_on:
      - database

volumes:
  db-data:
    driver: local
