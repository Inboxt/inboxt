services:
  postgres:
    image: postgres:18
    container_name: inboxt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-inboxt}
      POSTGRES_USER: ${DATABASE_USER:-inboxt}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inboxt_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-inboxt} -d ${DATABASE_NAME:-inboxt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: inboxt-valkey
    restart: unless-stopped
    command: >
      valkey-server
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - valkey_data:/data
    networks:
      - inboxt_network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  inboxt:
    image: ghcr.io/inboxt/inboxt:${IMAGE_TAG:-latest}
    container_name: inboxt
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-inboxt}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME:-inboxt}
    volumes:
      - .env:/app/.env
      - exports_data:/app/exports
    ports:
      - "7000:7000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - inboxt_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  valkey_data:
  exports_data:

networks:
  inboxt_network:
    driver: bridge