on:
  push:
    branches: [ master ]
    paths:
      - 'notifications.json'

jobs:
  sync-notifications:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.SCW_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_S3_SECRET_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.SCW_S3_REGION }}
      S3_ENDPOINT: ${{ secrets.SCW_S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.SCW_S3_BUCKET }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install awscli
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli

      - name: Upload notifications.json to Scaleway S3
        run: |
          aws s3 cp notifications.json \
            s3://$S3_BUCKET/notifications.json \
            --acl public-read \
            --endpoint-url="$S3_ENDPOINT"
