name: Sync notifications.json to Scaleway S3

on:
  push:
    branches: [ master ]
    paths:
      - 'notifications.json'  # Only trigger when this file changes

jobs:
  sync-notifications:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.SCW_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_S3_SECRET_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.SCW_S3_REGION }}
      S3_BUCKET: ${{ secrets.SCW_S3_BUCKET }}
      S3_ENDPOINT: ${{ secrets.SCW_S3_ENDPOINT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify notifications.json exists
        run: |
          echo "Current working directory:"
          pwd
          echo "Listing files in repo root:"
          ls -al
          if [ ! -f notifications.json ]; then
            echo "Error: notifications.json not found!"
            exit 1
          fi

      - name: Upload notifications.json to Scaleway S3
        run: |
          echo "Uploading notifications.json to s3://$S3_BUCKET/"
          aws s3 cp notifications.json s3://$S3_BUCKET/notifications.json \
            --region "$AWS_DEFAULT_REGION" \
            --endpoint-url "$S3_ENDPOINT" \
            --acl public-read
