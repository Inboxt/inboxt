name: Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'apps/api/**'
      - 'libs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-api.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          
          docker build \
            -f apps/api/Dockerfile.prod \
            -t ghcr.io/inboxt/inboxt-api:${IMAGE_TAG} \
            -t ghcr.io/inboxt/inboxt-api:latest \
            .
          
          docker push ghcr.io/inboxt/inboxt-api:${IMAGE_TAG}
          docker push ghcr.io/inboxt/inboxt-api:latest
          
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/inboxt
            
            # Pull new image
            docker pull ghcr.io/inboxt/inboxt-api:${{ env.IMAGE_TAG }}
            
            # Update IMAGE_TAG in .env
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ env.IMAGE_TAG }}/" .env
            
            # Restart API service
            docker-compose -f docker-compose.prod.yml up -d --no-deps api
            
            # Wait for health check
            echo "Waiting for API to become healthy..."
            timeout 60 bash -c 'until docker exec inboxt-api wget -q --spider http://localhost:7000/; do sleep 2; done'
            
            echo "✅ API deployed successfully (version: ${{ env.IMAGE_TAG }})"